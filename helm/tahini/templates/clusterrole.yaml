{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "tahini.fullname" . }}
  labels:
    {{- include "tahini.labels" . | nindent 4 }}
rules:
  # Core workload resources that OpenTofu templates can create
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - pods/exec
      - persistentvolumeclaims
      - services
      - configmaps
      - secrets
      - namespaces
      - serviceaccounts
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Apps resources
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Networking
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # RBAC (in case templates create roles for their workloads)
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources:
      - roles
      - rolebindings
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
{{- end }}

{{define "base"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{block "title" .}}tahini{{end}}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; font-size: 14px; color: #222; background: #fff; max-width: 1100px; margin: 0 auto; padding: 1.5rem 1rem; }
    nav { display: flex; align-items: center; gap: 1.5rem; border-bottom: 1px solid #ddd; padding-bottom: 0.75rem; margin-bottom: 1.5rem; }
    nav .brand { font-weight: bold; font-size: 1.1rem; color: #222; text-decoration: none; }
    nav a { color: #0066cc; text-decoration: none; }
    nav a:hover { text-decoration: underline; }
    nav form { margin: 0; margin-left: auto; }
    h1 { font-size: 1.4rem; margin-bottom: 1rem; }
    h2 { font-size: 1.1rem; margin: 1.5rem 0 0.5rem; }
    p { margin-bottom: 0.5rem; }
    a { color: #0066cc; text-decoration: none; }
    a:hover { text-decoration: underline; }
    table { border-collapse: collapse; width: 100%; margin-bottom: 1rem; }
    th, td { border: 1px solid #ddd; padding: 0.45rem 0.75rem; text-align: left; vertical-align: top; }
    th { background: #f5f5f5; font-weight: bold; }
    tr:hover td { background: #fafafa; }
    .badge { display: inline-block; padding: 1px 7px; border-radius: 3px; font-size: 0.85em; font-weight: bold; }
    .badge-running   { background: #d4edda; color: #155724; }
    .badge-stopped   { background: #e9ecef; color: #495057; }
    .badge-starting, .badge-stopping, .badge-deleting { background: #fff3cd; color: #856404; }
    .badge-error     { background: #f8d7da; color: #721c24; }
    .badge-succeeded { background: #d4edda; color: #155724; }
    .badge-failed    { background: #f8d7da; color: #721c24; }
    .badge-running-build { background: #cce5ff; color: #004085; }
    form.inline { display: inline; margin: 0; }
    label { display: block; margin-top: 0.75rem; font-weight: bold; font-size: 0.9em; }
    label.sub { font-weight: normal; color: #666; margin-top: 0.2rem; font-size: 0.85em; }
    input[type=text], input[type=password], select { padding: 0.35rem 0.5rem; border: 1px solid #ccc; font-family: monospace; font-size: 14px; width: 320px; }
    textarea { padding: 0.35rem 0.5rem; border: 1px solid #ccc; font-family: monospace; font-size: 13px; width: 100%; }
    .form-row { margin-top: 1.25rem; }
    button, .btn { padding: 0.35rem 0.9rem; cursor: pointer; border: 1px solid #bbb; background: #f5f5f5; font-family: monospace; font-size: 14px; text-decoration: none; display: inline-block; color: #222; border-radius: 2px; }
    button:hover, .btn:hover { background: #e8e8e8; }
    .btn-primary { background: #0066cc; border-color: #0052a3; color: #fff; }
    .btn-primary:hover { background: #0052a3; }
    .btn-danger { border-color: #c82333; color: #c82333; }
    .btn-danger:hover { background: #c82333; color: #fff; }
    .btn-sm { padding: 0.2rem 0.6rem; font-size: 13px; }
    .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .alert { padding: 0.5rem 0.75rem; border-radius: 2px; margin-bottom: 0.75rem; }
    .alert-error { background: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; }
    .alert-info { background: #cce5ff; border: 1px solid #b8daff; color: #004085; }
    .alert-success { background: #d4edda; border: 1px solid #c3e6cb; color: #155724; }
    pre.logs { background: #1e1e1e; color: #d4d4d4; padding: 0.75rem; border-radius: 3px; overflow: auto; white-space: pre-wrap; word-break: break-all; max-height: 480px; font-size: 12px; }
    .meta { color: #666; font-size: 0.88em; }
    .agent-dot { display:inline-block; width:8px; height:8px; border-radius:50%; vertical-align:middle; margin-left:4px; }
    .agent-dot-on  { background:#28a745; }
    .agent-dot-off { background:#6c757d; }
  </style>
</head>
<body>
<nav>
  <a class="brand" href="/">tahini</a>
  <a href="/environments">environments</a>
  <a href="/blueprints">blueprints</a>
  <a href="/admin/users">users</a>
  <a href="/profile">profile</a>
  <form action="/logout" method="post"><button class="btn-sm">logout</button></form>
</nav>
<main>
{{block "content" .}}{{end}}
</main>
{{block "scripts" .}}{{end}}
</body>
</html>
{{end}}

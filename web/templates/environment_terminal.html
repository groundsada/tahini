{{define "terminal"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>terminal – {{.Environment.Name}}</title>
  <link rel="stylesheet" href="/static/xterm.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #1e1e1e; overflow: hidden; }
    #bar {
      position: fixed; top: 0; left: 0; right: 0; height: 1.8rem;
      background: #2d2d2d; color: #aaa; font-family: monospace; font-size: 13px;
      padding: 0 0.75rem; display: flex; align-items: center; gap: 1rem;
      border-bottom: 1px solid #444; z-index: 10;
    }
    #bar a { color: #7ec8e3; text-decoration: none; }
    #bar a:hover { text-decoration: underline; }
    #status { font-size: 0.85em; }
    #terminal {
      position: fixed; top: 1.8rem; left: 0; right: 0; bottom: 0;
      padding: 4px;
    }
    .xterm { height: 100%; }
    .xterm-viewport { overflow-y: auto !important; }
  </style>
</head>
<body>
<div id="bar">
  <a href="/environments/{{.Environment.ID}}">&larr; {{.Environment.Name}}</a>
  <span id="status" style="color:#f0ad4e">connecting…</span>
</div>
<div id="terminal"></div>
<script src="/static/xterm.min.js"></script>
<script src="/static/xterm-addon-fit.min.js"></script>
<script>
(function () {
  var statusEl = document.getElementById('status');
  var envID = '{{.Environment.ID}}';

  function setStatus(text, color) {
    statusEl.textContent = text;
    statusEl.style.color = color || '#aaa';
  }

  var term = new Terminal({
    cursorBlink: true,
    fontSize: 14,
    fontFamily: '"Menlo", "Consolas", "Courier New", monospace',
    theme: {
      background: '#1e1e1e',
      foreground: '#d4d4d4',
    },
    scrollback: 5000,
  });

  var fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.open(document.getElementById('terminal'));

  function fit() {
    try { fitAddon.fit(); } catch (_) {}
  }
  requestAnimationFrame(fit);

  var proto = location.protocol === 'https:' ? 'wss' : 'ws';
  var wsURL = proto + '://' + location.host + '/ws/environments/' + envID + '/terminal';
  var ws = new WebSocket(wsURL);
  ws.binaryType = 'arraybuffer';

  ws.onopen = function () {
    setStatus('connected', '#5cb85c');
    term.focus();
    fit();
    ws.send(JSON.stringify({ type: 'resize', rows: term.rows, cols: term.cols }));
  };

  ws.onmessage = function (e) {
    if (e.data instanceof ArrayBuffer) {
      term.write(new Uint8Array(e.data));
    } else {
      try {
        var m = JSON.parse(e.data);
        if (m.type === 'closed') {
          setStatus('session closed', '#d9534f');
          term.write('\r\n[session closed]\r\n');
        } else if (m.type === 'error') {
          setStatus(m.message || 'error', '#d9534f');
          term.write('\r\n[' + (m.message || 'error') + ']\r\n');
        }
      } catch (_) {}
    }
  };

  ws.onerror = function () { setStatus('connection error', '#d9534f'); };

  ws.onclose = function () {
    if (statusEl.textContent === 'connected') {
      setStatus('disconnected', '#aaa');
    }
  };

  var enc = new TextEncoder();
  term.onData(function (data) {
    if (ws.readyState === WebSocket.OPEN) {
      ws.send(enc.encode(data).buffer);
    }
  });

  window.addEventListener('resize', function () {
    fit();
    if (ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'resize', rows: term.rows, cols: term.cols }));
    }
  });
})();
</script>
</body>
</html>
{{end}}

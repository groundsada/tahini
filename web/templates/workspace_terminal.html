{{define "terminal"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>terminal – {{.Workspace.Name}}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #1e1e1e; overflow: hidden; }
    #bar {
      position: fixed; top: 0; left: 0; right: 0; height: 1.8rem;
      background: #2d2d2d; color: #aaa; font-family: monospace; font-size: 13px;
      padding: 0 0.75rem; display: flex; align-items: center; gap: 1rem;
      border-bottom: 1px solid #444; z-index: 10;
    }
    #bar a { color: #7ec8e3; text-decoration: none; }
    #bar a:hover { text-decoration: underline; }
    #status { font-size: 0.85em; }
    #screen {
      position: fixed; top: 1.8rem; left: 0; right: 0; bottom: 0;
      font-family: "Menlo", "Consolas", "Courier New", monospace;
      font-size: 14px; line-height: 1.4;
      background: #1e1e1e; color: #d4d4d4;
      overflow-y: auto; padding: 4px;
      white-space: pre-wrap; word-break: break-all;
      outline: none; cursor: text;
    }
  </style>
</head>
<body>
<div id="bar">
  <a href="/workspaces/{{.Workspace.ID}}">&larr; {{.Workspace.Name}}</a>
  <span id="status" style="color:#f0ad4e">connecting…</span>
</div>
<div id="screen" tabindex="0"></div>
<script>
(function () {
  var screen = document.getElementById('screen');
  var statusEl = document.getElementById('status');
  var workspaceID = '{{.Workspace.ID}}';

  function setStatus(text, color) {
    statusEl.textContent = text;
    statusEl.style.color = color || '#aaa';
  }

  var enc = new TextEncoder();
  var dec = new TextDecoder();

  // Write raw text to the screen, handling basic escape sequences.
  // We keep it simple: strip CSI/OSC sequences, handle \r\n \b.
  function write(str) {
    // Strip ANSI escape sequences (CSI, OSC, etc.)
    str = str.replace(/\x1b\[[0-9;]*[a-zA-Z]/g, '')   // CSI sequences
             .replace(/\x1b\][^\x07\x1b]*(\x07|\x1b\\)/g, '')  // OSC sequences
             .replace(/\x1b[()][AB012]/g, '')           // charset
             .replace(/\x1b[=>]/g, '')                  // DECPNM/DECPAM
             .replace(/\x1b[78]/g, '');                 // DECSC/DECRC
    for (var i = 0; i < str.length; i++) {
      var ch = str[i];
      if (ch === '\r') { /* ignore bare CR */ }
      else if (ch === '\b') {
        screen.textContent = screen.textContent.slice(0, -1);
      } else {
        screen.textContent += ch;
      }
    }
    screen.scrollTop = screen.scrollHeight;
  }

  var proto = location.protocol === 'https:' ? 'wss' : 'ws';
  var wsURL = proto + '://' + location.host + '/ws/workspaces/' + workspaceID + '/terminal';
  var ws = new WebSocket(wsURL);
  ws.binaryType = 'arraybuffer';

  ws.onopen = function () {
    setStatus('connected', '#5cb85c');
    screen.focus();
    var cols = Math.floor(screen.clientWidth / 8) || 80;
    var rows = Math.floor(screen.clientHeight / 19) || 24;
    ws.send(JSON.stringify({ type: 'resize', rows: rows, cols: cols }));
  };

  ws.onmessage = function (e) {
    if (e.data instanceof ArrayBuffer) {
      write(dec.decode(new Uint8Array(e.data)));
    } else {
      try {
        var m = JSON.parse(e.data);
        if (m.type === 'closed') {
          setStatus('session closed', '#d9534f');
          write('\r\n[session closed]\r\n');
        } else if (m.type === 'error') {
          setStatus(m.message || 'error', '#d9534f');
          write('\r\n[' + (m.message || 'error') + ']\r\n');
        }
      } catch (_) {}
    }
  };

  ws.onerror = function () { setStatus('connection error', '#d9534f'); };

  ws.onclose = function () {
    if (statusEl.textContent === 'connected') {
      setStatus('disconnected', '#aaa');
    }
  };

  // Send keystrokes as raw binary stdin.
  screen.addEventListener('keydown', function (e) {
    if (ws.readyState !== WebSocket.OPEN) return;
    var key = null;
    if (e.key.length === 1 && !e.ctrlKey && !e.metaKey) {
      key = e.key;
    } else if (e.ctrlKey && e.key.length === 1) {
      var code = e.key.toUpperCase().charCodeAt(0) - 64;
      if (code > 0 && code < 32) key = String.fromCharCode(code);
    } else {
      var map = {
        'Enter': '\r', 'Backspace': '\x7f', 'Tab': '\t',
        'ArrowUp': '\x1b[A', 'ArrowDown': '\x1b[B',
        'ArrowRight': '\x1b[C', 'ArrowLeft': '\x1b[D',
        'Home': '\x1b[H', 'End': '\x1b[F',
        'Delete': '\x1b[3~', 'Escape': '\x1b',
      };
      key = map[e.key] || null;
    }
    if (key !== null) {
      e.preventDefault();
      ws.send(enc.encode(key).buffer);
    }
  });

  // Paste support.
  screen.addEventListener('paste', function (e) {
    e.preventDefault();
    if (ws.readyState !== WebSocket.OPEN) return;
    var text = (e.clipboardData || window.clipboardData).getData('text');
    if (text) ws.send(enc.encode(text).buffer);
  });

  // Resize.
  window.addEventListener('resize', function () {
    if (ws.readyState !== WebSocket.OPEN) return;
    var cols = Math.floor(screen.clientWidth / 8) || 80;
    var rows = Math.floor(screen.clientHeight / 19) || 24;
    ws.send(JSON.stringify({ type: 'resize', rows: rows, cols: cols }));
  });
})();
</script>
</body>
</html>
{{end}}

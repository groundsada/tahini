{{define "title"}}new blueprint - tahini{{end}}
{{define "content"}}
<h1>new blueprint</h1>
{{if .Error}}<div class="alert alert-error">{{.Error}}</div>{{end}}
<form method="post" action="/blueprints" style="max-width:860px">
  <div class="form-row">
    <label for="name">name</label>
    <input type="text" id="name" name="name" placeholder="my-k8s-environment" required>
  </div>
  <div class="form-row">
    <label for="description">description</label>
    <label class="sub">optional</label>
    <input type="text" id="description" name="description" placeholder="short description">
  </div>
  <div class="form-row">
    <label for="git_url">git raw URL</label>
    <label class="sub">optional. if set, HCL is fetched from this URL on sync. e.g. a raw GitHub URL.</label>
    <input type="text" id="git_url" name="git_url" placeholder="https://raw.githubusercontent.com/…/main.tf" style="width:600px">
  </div>
  <div class="form-row">
    <label for="hcl">opentofu blueprint (HCL)</label>
    <label class="sub">
      use the <code>kubernetes</code> provider. a <code>variable "transition"</code> is automatically injected
      with values <code>start</code> / <code>stop</code> / <code>delete</code> so your blueprint can react.
    </label>
    <textarea id="hcl" name="hcl" rows="28" required spellcheck="false" placeholder='terraform {
  required_providers {
    kubernetes = { source = "hashicorp/kubernetes" }
  }
}

variable "transition" { default = "start" }
variable "name"       { default = "my-environment" }
variable "namespace"  { default = "default" }

provider "kubernetes" {}

resource "kubernetes_pod_v1" "main" {
  count = var.transition == "stop" ? 0 : 1
  metadata {
    name      = var.name
    namespace = var.namespace
  }
  spec {
    container {
      name    = "main"
      image   = "alpine:3.19"
      command = ["sleep", "infinity"]
    }
    restart_policy = "Never"
  }
}'></textarea>
  </div>
  <div class="form-row" style="margin-top:1rem">
    <button type="submit" class="btn-primary">create blueprint</button>
    <a href="/blueprints" class="btn" style="margin-left:0.5rem">cancel</a>
  </div>
</form>
{{end}}
